version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: marketplace_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketplace
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  flyway:
    image: flyway/flyway:10
    container_name: marketplace_flyway
    command: -url=jdbc:postgresql://postgres:5432/marketplace
             -user=postgres
             -password=postgres
             migrate
    volumes:
      - ./migrations:/flyway/sql
    depends_on:
      - postgres

volumes:
  postgres_data:
